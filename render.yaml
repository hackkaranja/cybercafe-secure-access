services:
  - type: web
    name: cybercafe-secure-access
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/cafe_secure.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
